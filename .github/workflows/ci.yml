name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --verbose

      - name: Prepare Npcap SDK (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sdkZip = "$env:RUNNER_TEMP\npcap-sdk.zip"
          $sdkDir = "$env:RUNNER_TEMP\npcap-sdk"
          $url = 'https://npcap.com/dist/npcap-sdk-1.15.zip'
          Write-Host "Downloading Npcap SDK from $url"
          $maxRetries = 3
          $retryCount = 0
          while ($retryCount -lt $maxRetries) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $sdkZip -TimeoutSec 60
              break
            } catch {
              $retryCount++
              Write-Host "Download attempt $retryCount failed: $_"
              if ($retryCount -ge $maxRetries) { throw "Failed to download Npcap SDK after $maxRetries attempts" }
              Start-Sleep -Seconds 5
            }
          }

          Write-Host "Extracting $sdkZip to $sdkDir"
          if (Test-Path $sdkDir) { Remove-Item -Recurse -Force $sdkDir }
          Expand-Archive -Path $sdkZip -DestinationPath $sdkDir -Force

          # Search for pcap.h to find include path
          $pcapHeader = Get-ChildItem -Path $sdkDir -Recurse -File -Filter pcap.h | Select-Object -First 1
          if (-not $pcapHeader) { throw "pcap.h not found in SDK" }
          $includeDir = $pcapHeader.Directory.FullName
          Write-Host "Include directory: $includeDir"

          # Search for Packet.lib (prefer x64)
          $packetLibFile = Get-ChildItem -Path $sdkDir -Recurse -File -Filter Packet.lib | Where-Object { $_.DirectoryName -like '*x64*' } | Select-Object -First 1
          if (-not $packetLibFile) { $packetLibFile = Get-ChildItem -Path $sdkDir -Recurse -File -Filter Packet.lib | Select-Object -First 1 }
          if (-not $packetLibFile) { throw "Packet.lib not found in SDK" }
          $libDir = $packetLibFile.Directory.FullName
          Write-Host "Using LIB dir: $libDir"

          # Use the extracted root directory
          $sdkRoot = (Get-ChildItem -Path $sdkDir -Directory | Select-Object -First 1)
          if (-not $sdkRoot) { $sdkRoot = (Get-Item $sdkDir) }

          "WPCAP_DIR=$($sdkRoot.FullName)" >> $env:GITHUB_ENV
          "NPCAP_DIR=$($sdkRoot.FullName)" >> $env:GITHUB_ENV
          "LIB=$libDir;$env:LIB" >> $env:GITHUB_ENV
          "INCLUDE=$includeDir;$env:INCLUDE" >> $env:GITHUB_ENV

          # Add SDK DLL directory to PATH for runtime
          $dllDir = Get-ChildItem -Path $sdkDir -Recurse -File -Filter wpcap.dll | Where-Object { $_.DirectoryName -like '*x64*' } | Select-Object -First 1
          if ($dllDir) {
            "PATH=$($dllDir.DirectoryName);$env:PATH" >> $env:GITHUB_ENV
            Write-Host "Added wpcap.dll directory to PATH: $($dllDir.DirectoryName)"
          }

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --verbose
