# IP Scanner Configuration

[api]
enabled = true
host = "0.0.0.0"
port = 9090

[scan]
ports = "21,22,23,25,53,80,110,143,443,445,3306,3389,5432,6379,8080,8443,9200,27017"
timeout = 500
concurrency = 500
database = "scan_results.db"
verbose = false
loop_mode = false
ipv4 = true
ipv6 = false
only_store_open = true
skip_private = true
syn = false

[rate_limit]
max_rate = 200000
window_duration = 1
